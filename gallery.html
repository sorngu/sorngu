<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品集 | Photography</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-text">Photography</span>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">首页</a></li>
                <li><a href="gallery.html" class="nav-link active">作品集</a></li>
                <li><a href="about.html" class="nav-link">关于</a></li>
            </ul>
            <button class="hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <main>
        <section class="page-header">
            <div class="container">
                <h1 class="page-title">作品集</h1>
                <p class="page-subtitle">探索我的摄影世界</p>
            </div>
        </section>

        <section class="filters">
            <div class="container">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="landscape">风景</button>
                    <button class="filter-btn" data-filter="street">街拍</button>
                    <button class="filter-btn" data-filter="portrait">人像</button>
                </div>
            </div>
        </section>

        <section class="gallery">
            <div class="container">
                <div class="gallery-grid" id="galleryGrid">
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <h3>Photography</h3>
                    <p>用光影讲述故事</p>
                </div>
                <div class="footer-links">
                    <a href="index.html">首页</a>
                    <a href="gallery.html">作品集</a>
                    <a href="about.html">关于</a>
                </div>
                <div class="footer-social">
                    <a href="#" aria-label="Instagram">Instagram</a>
                    <a href="#" aria-label="Behance">Behance</a>
                    <a href="#" aria-label="Email">Email</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Photography. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" aria-label="Close">&times;</button>
        <img src="" alt="" id="lightboxImage">
    </div>

    <script src="js/main.js"></script>
</body>
</html>
