<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works | Photography</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="index.html" class="nav-logo">Photography</a>
            <ul class="nav-list">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="gallery.html" class="nav-link">Works</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <h1 class="page-title">Works</h1>
            <p class="page-subtitle">Gallery</p>
        </section>

        <section class="filters">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="landscape">Landscape</button>
                <button class="filter-btn" data-filter="street">Street</button>
                <button class="filter-btn" data-filter="portrait">Portrait</button>
            </div>
        </section>

        <section class="gallery">
            <div class="container">
                <div class="gallery-grid" id="galleryGrid">
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-nav">
                <a href="index.html">Home</a>
                <a href="index.html#works">Works</a>
                <a href="gallery.html">Gallery</a>
                <a href="about.html">About</a>
            </div>
            <div class="footer-info">
                <p>&copy; 2026 Photography</p>
            </div>
        </div>
    </footer>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close">&times;</button>
        <img src="" alt="" id="lightboxImage">
    </div>

    <script src="js/main.js"></script>
</body>
</html>
