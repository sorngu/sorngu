<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="index.html" class="nav-logo">Photography</a>
            <ul class="nav-list">
                <li><a href="#works" class="nav-link">Works</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-inner">
                <h1 class="hero-title">Capturing Moments</h1>
                <p class="hero-sub">Photography</p>
            </div>
            <div class="hero-image">
                <img src="picture/1.jpg" alt="Featured">
            </div>
        </section>

        <section id="works" class="works">
            <div class="container">
                <h2 class="section-title">Selected Works</h2>
                <div class="works-grid" id="worksGrid">
                </div>
                <div class="view-all">
                    <a href="gallery.html" class="view-all-link">View All Works</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-nav">
                <a href="index.html">Home</a>
                <a href="#works">Works</a>
                <a href="gallery.html">Gallery</a>
                <a href="about.html">About</a>
            </div>
            <div class="footer-info">
                <p>&copy; 2026 Photography</p>
            </div>
        </div>
    </footer>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close">&times;</button>
        <img src="" alt="" id="lightboxImage">
    </div>

    <script src="js/main.js"></script>
</body>
</html>
